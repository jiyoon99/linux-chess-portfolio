map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream chess_backend {
  server backend:3000;
}

upstream chess_frontend {
  server frontend:80;
}

server {
  listen 80;
  server_name _;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
  proxy_hide_header X-Content-Type-Options;
  proxy_hide_header X-Frame-Options;
  proxy_hide_header Referrer-Policy;
  proxy_hide_header Permissions-Policy;
  proxy_hide_header Content-Security-Policy;

  location /ws {
    proxy_pass http://chess_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  location /health {
    proxy_pass http://chess_backend;
  }

  location /ready {
    proxy_pass http://chess_backend;
  }

  location /metrics {
    proxy_pass http://chess_backend;
  }

  location /auth/ {
    proxy_pass http://chess_backend;
  }

  location /games/ {
    proxy_pass http://chess_backend;
  }

  location /admin/ {
    proxy_pass http://chess_backend;
  }

  location / {
    proxy_pass http://chess_frontend;
  }
}
